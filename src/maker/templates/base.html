<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "Maker Courseware" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Local Courseware Studio</p>
          <h1><a href="/">Maker Courseware</a></h1>
          <p class="hero-copy">
            Turn a course brief and supporting materials into a reviewable content plan, then into real teaching files.
          </p>
        </div>
      </header>

      {% if message %}
      <div class="banner success">{{ message }}</div>
      {% endif %}
      {% if error %}
      <div class="banner error">{{ error }}</div>
      {% endif %}

      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
